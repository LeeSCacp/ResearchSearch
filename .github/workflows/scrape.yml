name: 연구과제 공고 수집 및 Pages 배포

on:
  schedule:
    # UTC 기준: 0, 6, 12, 18시 → KST 9, 15, 21, 3시
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:  # GitHub UI에서 수동 실행 가능

permissions:
  contents: write   # docs/data/ JSON 커밋 권한

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Node.js 20 deprecation 경고 해소 (actions/checkout·cache·setup-python)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 체크아웃 ─────────────────────────────────────────────────────────────
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # ── SQLite DB 캐시 복원 (실행 간 상태 유지) ──────────────────────────────
      # 이전 실행의 DB를 캐시에서 복원해 중복 알림을 방지한다.
      # 캐시 미스(최초 실행 등)인 경우 DB 없이 시작하며 init_db()가 자동 생성한다.
      - name: DB 캐시 복원
        uses: actions/cache@v4
        with:
          path: data/
          key: db-${{ github.run_id }}
          restore-keys: |
            db-

      - name: data/ 디렉토리 확인
        run: mkdir -p data

      # ── Python 설정 ──────────────────────────────────────────────────────────
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      # ── 스크래핑 실행 ────────────────────────────────────────────────────────
      - name: 스크래핑 및 JSON 내보내기
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CALENDAR_CREDENTIALS: ${{ secrets.GOOGLE_CALENDAR_CREDENTIALS }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: python scripts/run_scrape.py

      # ── 결과 커밋 및 푸시 ───────────────────────────────────────────────────
      - name: 변경된 데이터 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          # 변경이 없으면 커밋 건너뜀 (exit 0 유지)
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git commit -m "chore: update announcements $(date -u +'%Y-%m-%d %H:%MZ')"
            # 동시 실행 / 코드 push 이후 충돌 방지: 원격 변경 사항 먼저 병합
            git pull --rebase origin main
            git push origin main
          fi

      # ── 침묵 고장 감지 게이트 ────────────────────────────────────────────────
      # 스크래퍼 연속 2회 비정상 또는 다이제스트 발송 실패 시 워크플로를 실패
      # 처리한다 → GitHub이 실패 알림 메일을 보내 "고장난 줄 모르는 고장" 방지.
      # (데이터 커밋 후에 실행되므로 수집 결과는 보존됨)
      - name: 수집 상태 점검
        run: |
          if [ -f data/health_fail.flag ]; then
            echo "::error::시스템 비정상 감지"
            cat data/health_fail.flag
            exit 1
          fi
          echo "모든 소스 정상"
