# =============================================
# 연구과제 키워드 동의어 사전
# =============================================
# 같은 그룹의 단어들은 서로 동의어로 처리됩니다.
# 어떤 단어로 검색해도 같은 그룹의 모든 단어가 함께 검색됩니다.
#
# [편집 방법]
#   - 새 그룹 추가: groups 아래에 - id/label/terms 형식으로 추가
#   - 동의어 추가: 해당 그룹의 terms 아래에 항목 추가
#   - 변경 후 서버 재시작 없이 검색 시 자동 반영됨
# =============================================

