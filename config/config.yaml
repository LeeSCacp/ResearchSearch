scraping:
  interval_hours: 6
  sites:
    nrf: true
    ntis: true
    iris: true

filters:
  # 포함 키워드: 하나라도 매칭되면 알림 대상
  # 주의: 동의어 확장 없이 정확한 부분 문자열 매칭만 사용
  #   → "AI" 대신 "인공지능"으로 명시 (AI 두 글자는 자율주행·반도체 공고에도 빈출)
  #   → "정신건강"을 직접 추가 ("심리" 단독으로는 정신건강 공고를 못 잡음)
  keywords:
    - 심리
    - 정신건강
    - 인지
    - 발달
    - 노년
    - 노화
    - 치매
    - 고령
    - 인공지능
    # NRF 사업명은 세부 분야 대신 분야명을 쓰므로 제목 매칭용으로 추가
    # (categories는 category 필드에만 매칭되어 제목의 "인문사회연구소지원사업"을 못 잡음)
    - 인문사회
    - 사회과학
    - 인문학

  # 포함 카테고리: 분야명이 매칭되면 알림 대상
  categories:
    - 인문사회
    - 인문학
    - 사회과학
    - 의학

  # 제외 키워드: 포함 조건보다 먼저 평가 — 매칭되면 알림 차단
  # 대시보드 '전체 요약' 탭에서도 동일하게 적용 (명백히 무관 분야 공고 숨김)
  exclude_keywords:
    - 우주
    - 항공
    - 위성
    - 방산
    - 방위산업
    - 반도체
    - 나노
    - 소재         # 나노소재·첨단소재·소재기술 포함
    - 신소재
    - 양자         # 양자컴퓨팅·양자이득 등 물리/공학 전용 과제
    - 국방         # 미래국방혁신기술 등
    - 기계공학
    - 토목
    - 건축공학
    - 건설
    - 조선
    - 해양
    - 태양광
    - 풍력
    - 수소에너지
    - 원자력
    - 원자로
    - 자율주행       # AI 자율주행 차량 개발 공고 차단

notifications:
  email:
    enabled: true
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    sender: "tirano1019@gmail.com"
    password: ""          # .env 또는 GitHub Secret EMAIL_PASSWORD로 주입
    recipients:
      - "tirano1019@gmail.com"
    dashboard_url: "https://leescacp.github.io/ResearchSearch/"

  telegram:
    enabled: true         # GitHub Secret TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID 필요
    bot_token: ""         # 환경변수로 주입
    chat_id: ""           # 환경변수로 주입

  google_calendar:
    enabled: false        # 2026-07-18 사용자 요청으로 비활성화 (다듬는 동안 캘린더 오염 방지)
                          # 재활성화: true로 변경만 하면 됨 (Secret은 유지되어 있음)
    calendar_id: ""       # 환경변수 GOOGLE_CALENDAR_ID로 주입

database:
  path: "data/announcements.db"
