scraping:
  interval_hours: 6
  sites:
    nrf: true
    ntis: true
    iris: true

filters:
  # 포함 키워드: 제목·분야에서 매칭되면 알림 대상
  # 주의 (2026-07-18 정밀화):
  #   - 본문(description) 단독 매칭은 통과 불가 — 본문에 스치듯 언급된
  #     단어("인공지능집적단지 연구" 등)로 무관 공고가 통과하던 문제 차단
  #   - 동의어 확장 없이 정확한 부분 문자열 매칭만 사용
  keywords:
    - 심리
    - 정신건강
    - 정신의학
    - 상담
    - 정서
    - 인지
    - 발달
    - 뇌과학
    - 신경과학
    - 노년
    - 노인
    - 노화
    - 치매
    - 고령
    # NRF 사업명은 세부 분야 대신 분야명을 쓰므로 제목 매칭용으로 추가
    # "인문"은 인문사회·인문학·인문분야·인문한국을 모두 포괄
    - 인문
    - 사회과학
    # 주의: "학습"은 넣지 않는다 — "기계학습" 오탐. "중견연구"·"신진연구" 등
    # 전 분야 공통 사업명도 넣지 않는다 — 이공계 공고 전체가 통과되는 부작용

  # 조건부 키워드: 단독으로는 통과 불가, 핵심 키워드(위 keywords)와
  # 동시 등장할 때만 통과 — "심리학×AI 융합"만 잡고 순수 ICT 과제는 차단
  #   통과 예: "인공지능 기반 심리상담 플랫폼" (인공지능+심리)
  #   차단 예: "인공지능혁신인재양성" (인공지능 단독)
  conditional_keywords:
    - 인공지능
    - AI

  # 포함 카테고리: 분야명이 매칭되면 알림 대상
  categories:
    - 인문사회
    - 인문학
    - 사회과학
    - 의학

  # 제외 키워드: 포함 조건보다 먼저 평가 — 매칭되면 알림 차단
  # 대시보드 '전체 요약' 탭에서도 동일하게 적용 (명백히 무관 분야 공고 숨김)
  exclude_keywords:
    - 우주
    - 항공
    - 위성
    - 방산
    - 방위산업
    - 반도체
    - 나노
    - 소재         # 나노소재·첨단소재·소재기술 포함
    - 신소재
    - 양자         # 양자컴퓨팅·양자이득 등 물리/공학 전용 과제
    - 국방         # 미래국방혁신기술 등
    - 기계공학
    - 토목
    - 건축공학
    - 건설
    - 조선
    - 해양
    - 태양광
    - 풍력
    - 수소에너지
    - 원자력
    - 원자로
    - 자율주행       # AI 자율주행 차량 개발 공고 차단

notifications:
  email:
    enabled: true
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    sender: "tirano1019@gmail.com"
    password: ""          # .env 또는 GitHub Secret EMAIL_PASSWORD로 주입
    recipients:
      - "tirano1019@gmail.com"
    dashboard_url: "https://leescacp.github.io/ResearchSearch/"

  telegram:
    enabled: true         # GitHub Secret TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID 필요
    bot_token: ""         # 환경변수로 주입
    chat_id: ""           # 환경변수로 주입

  google_calendar:
    enabled: false        # 2026-07-18 사용자 요청으로 비활성화 (다듬는 동안 캘린더 오염 방지)
                          # 재활성화: true로 변경만 하면 됨 (Secret은 유지되어 있음)
    calendar_id: ""       # 환경변수 GOOGLE_CALENDAR_ID로 주입

database:
  path: "data/announcements.db"
